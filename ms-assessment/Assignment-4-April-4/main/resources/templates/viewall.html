<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Employee List</h2>

<p th:text="${message}" style="color:green;"></p>

<table>
<tr color="red">
    <th>ID</th>
    <th>Name</th>
    <th>Salary</th>
    <th>DOJ</th>
    <th>Dept</th>
    <th>Action</th>
</tr>

<tr th:each="emp : ${employees}">
    <td th:text="${emp.empId}"></td>
    <td th:text="${emp.empName}"></td>
    <td th:text="${emp.empSal}"></td>
    <td th:text="${emp.empDoj}"></td>
    <td th:text="${emp.deptName}"></td>
    <td>
        <a th:href="@{/edit/{id}(id=${emp.empId})}">Edit</a>
        <a th:href="@{/delete/{id}(id=${emp.empId})}">Delete</a>
    </td>
</tr>

</table>

</body>
</html>
